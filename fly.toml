# fly.toml app configuration file generated for gosuslugi-portal-api on 2026-07-04T07:57:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gosuslugi-portal-api'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORTAL_DATA_DIR = '/data'

[[mounts]]
  source = 'portal_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
