# Fly.io deploy from GitHub
app = "gosuslugi-portal-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORTAL_DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[mounts]
  source = "portal_data"
  destination = "/data"
