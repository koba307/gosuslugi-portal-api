# fly.toml app configuration file generated for gosuslugi-portal-api on 2026-07-09T20:57:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "gosuslugi-portal-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORTAL_DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  checks = [{ grace_period = '20s', interval = '30s', method = 'GET', path = '/api/health', timeout = '5s' }]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[mounts]
  source = "portal_data"
  destination = "/data"

[processes]
  app = ''
