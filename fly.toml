# Deploy target: https://gosuslugi.fly.dev
app = "gosuslugi"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORTAL_DATA_DIR = "/data"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[mounts]
  source = "portal_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
