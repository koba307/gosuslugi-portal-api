# Render Blueprint (платный Starter + диск 1 GB — данные и фото сохраняются).
services:
  - type: web
    name: portal-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python portal_api.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: PORTAL_DATA_DIR
        value: /var/data
      - key: PORTAL_ADMIN_PASSWORD
        sync: false
    disk:
      name: portal-data
      mountPath: /var/data
      sizeGB: 1